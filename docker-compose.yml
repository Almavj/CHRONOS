       # MISP Database
  misp-db:
    image: mysql:5.7
    hostname: misp-db
    container_name: chronos-misp-db
    profiles:
      - full
      - threat-intel
    environment:
      - MYSQL_ROOT_PASSWORD=misp123
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp123
    volumes:
      - misp_db_data:/var/lib/mysql
    networks:
      chronos-network:
      #  ipv4_address: 172.18.0.3
    restart: unless-stopped
    command: --sql_mode= --innodb_strict_mode=0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmisp123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MISP Redis
  misp-redis:
    image: redis:7.2-alpine
    hostname: misp-redis
    container_name: chronos-misp-redis
    profiles:
      - full
      - threat-intel
    ports:
      - "6380:6379"
    volumes:
      - misp_redis_data:/data
    networks:
      chronos-network:
      #  ipv4_address: 172.18.0.2
    restart: unless-stopped

  # MISP Main Application - USING WORKING IMAGE
  misp:
    image: harvarditsecurity/misp:latest
    hostname: misp
    container_name: chronos-misp
    profiles:
      - full
      - threat-intel
    ports:
      - "8443:443"
    depends_on:
      misp-db:
        condition: service_healthy
      misp-redis:
        condition: service_started
    environment:
      - MYSQL_HOST=misp-db
      - MYSQL_DATABASE=misp
      - MYSQL_USER=misp
      - MYSQL_PASSWORD=misp123
      - MYSQL_ROOT_PASSWORD=misp123
      - REDIS_HOST=misp-redis
      - TIMEZONE=America/New_York
      - MISP_BASEURL=https://localhost:8443
      - MISP_EMAIL=admin@localhost
      - MISP_ADMIN_EMAIL=admin@localhost
      - MISP_ADMIN_PASSPHRASE=admin
      - MISP_FQDN=localhost
      - MISP_HTTPS=false
    volumes:
      - misp_data:/var/www/MISP
      - misp_logs:/var/log/apache2
    networks:
      chronos-network:
       # ipv4_address: 172.18.0.4
    restart: unless-stopped
    extra_hosts:
      - "misp:127.0.0.1"
    
volumes:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  elasticsearch_data:
  elasticsearch_logs:
  grafana_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  misp_data:
  misp_logs:
  misp_db_data:
  misp_redis_data:

networks:
  chronos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16