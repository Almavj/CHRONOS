title: SMB Lateral Movement
id: 1000002
status: stable
author: CHRONOS Community
date: 2024-01-01
level: critical
tags:
  - attack.lateral_movement
  - attack.t1021
  - attack.t1021.002
description: Detects SMB lateral movement patterns
detection:
  selection:
    dest_port: 445
    process_name|contains:
      - 'smb'
      - 'psexec'
      - 'netuse'
  condition: selection
falsepositives:
  - File server access

---
title: Windows Defender Disabled
id: 1000003
status: stable
author: CHRONOS Community
date: 2024-01-01
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562
  - attack.t1562.001
description: Detects Windows Defender being disabled
detection:
  selection:
    process_name: MpDefenderCoreTask.exe
    action: disabled
  selection2:
    command_line|contains:
      - 'Disable-Antivirus'
      - 'Set-MpPreference -Disable*'
  condition: selection or selection2
falsepositives:
  - Group policy changes

---
title: Suspicious DLL Load
id: 1000004
status: stable
author: CHRONOS Community
date: 2024-01-01
level: high
tags:
  - attack.defense_evasion
  - attack.t1574
  - attack.execution
  - attack.t1204
description: Detects loading of suspicious DLLs
detection:
  selection:
    event_id: 7
    image|contains:
      - 'rundll32'
      - 'regsvr32'
    dll_name|contains:
      - '.tmp'
      - 'temp'
  condition: selection
falsepositives:
  - Legitimate DLL loading

---
title: Cobalt Strike DNS Beaconing
id: 1000005
status: stable
author: CHRONOS Community
date: 2024-01-01
level: critical
tags:
  - attack.command_and_control
  - attack.t1071
  - attack.t1071.004
description: Detects potential Cobalt Strike DNS beaconing
detection:
  selection:
    dns_query|contains:
      - '.cdn.'
      - '.cloudflare.'
      - '.aws.'
    query_length|gt: 50
  condition: selection
falsepositives:
  - Legitimate long DNS queries

