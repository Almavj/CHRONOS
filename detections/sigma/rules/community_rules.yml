title: Credential Dumping via LSASS
id: 1000006
status: stable
author: CHRONOS Community
date: 2024-01-01
level: critical
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
description: Detects LSASS process access for credential dumping
detection:
  selection:
    event_id: 10
    target_process: lsass.exe
    granted_access: '0x1400'
  condition: selection
falsepositives:
  - Legitimate security scanning

---
title: Persistence via Registry Run Keys
id: 1000007
status: stable
author: CHRONOS Community
date: 2024-01-01
level: high
tags:
  - attack.persistence
  - attack.t1547
  - attack.t1547.001
description: Detects registry run key persistence
detection:
  selection:
    event_id: 4657
    registry_key|contains:
      - 'Software\\Microsoft\\Windows\\CurrentVersion\\Run'
      - 'Software\\Microsoft\\Windows\\CurrentVersion\\RunOnce'
  condition: selection
falsepositives:
  - Legitimate software installation

