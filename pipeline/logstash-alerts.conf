input {
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["chronos.alerts"]
    codec => json
    consumer_group => "logstash-alerts"
  }
}

filter {
  date {
    match => ["alert_timestamp", "ISO8601", "UNIX"]
    target => "@timestamp"
  }
  
  mutate {
    add_field => { "index_name" => "chronos-alerts-%{+YYYY.MM}" }
    
    rename => {
      "alert_id" => "alert_id"
      "alert_title" => "title"
      "severity" => "alert_severity"
    }
  }
  
  if [mitre_technique] {
    mutate { add_field => { "has_mitre_mapping" => "true" } }
  }
  
  if [indicators] and [indicators] != [] {
    mutate { add_field => { "has_indicators" => "true" } }
  }
  
  if [alert_severity] == "critical" {
    mutate { add_tag => ["urgent"] }
  }
  
  if [response_actions] and [response_actions] != [] {
    mutate { add_field => { "auto_responded" => "true" } }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "chronos-alerts-%{+YYYY.MM}"
    document_id => "%{alert_id}"
  }
  
  if [alert_severity] in ["critical", "high"] {
    kafka {
      bootstrap_servers => "kafka:9092"
      topic_id => "chronos.priority-alerts"
      codec => json
    }
  }
  
  if [notify] == "true" {
    email {
      to => "soc@company.com"
      from => "chronos@company.com"
      subject => "CHRONOS Alert: %{title}"
      via => "smtp"
      options => {
        address => "smtp.company.com"
        port => 587
        enable_starttls_auto => true
      }
    }
  }
}
