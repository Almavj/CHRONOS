title: Suspicious PowerShell Download
id: 1000001
status: stable
author: CHRONOS Community
date: 2024-01-01
level: high
tags:
  - attack.initial_access
  - attack.t1566
  - attack.execution
  - attack.t1059
description: Detects suspicious PowerShell download commands
detection:
  selection:
    process_name: powershell.exe
    command_line|contains:
      - 'Invoke-WebRequest'
      - 'iwr'
      - 'curl'
      - 'wget'
      - 'DownloadFile'
  condition: selection
falsepositives:
  - Legitimate software updates
  - Admin scripts

