input {
  beats {
    port => 5044
  }
  
  kafka {
    bootstrap_servers => "kafka:9092"
    topics => ["chronos.events"]
    codec => json
    consumer_group => "logstash-events"
  }
  
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  if [event][module] == "sysmon" {
    mutate { add_field => { "data_source" => "sysmon" } }
    
    if [EventID] == 1 {
      mutate { add_field => { "event_type" => "process_creation" } }
    } else if [EventID] == 3 {
      mutate { add_field => { "event_type" => "network_connection" } }
    } else if [EventID] == 7 {
      mutate { add_field => { "event_type" => "module_load" } }
    } else if [EventID] == 8 {
      mutate { add_field => { "event_type" => "create_remote_thread" } }
    } else if [EventID] == 13 {
      mutate { add_field => { "event_type" => "reg_value_set" } }
    }
  }
  
  if [event][module] == "zeek" {
    mutate { add_field => { "data_source" => "zeek" } }
    
    if [conn] {
      mutate { add_field => { "event_type" => "connection" } }
    } else if [dns] {
      mutate { add_field => { "event_type" => "dns_query" } }
    } else if [http] {
      mutate { add_field => { "event_type" => "http_request" } }
    } else if [ssl] {
      mutate { add_field => { "event_type" => "ssl_handshake" } }
    }
  }
  
  date {
    match => ["timestamp", "ISO8601", "UNIX_MS"]
    target => "@timestamp"
  }
  
  geoip {
    source => "src_ip"
    target => "src_geo"
    database => "/usr/share/logstash/vendor/bundle/jruby/2.6.0/gems/geoip-6.1.0-java/vendor/GeoLite2-City.mmdb"
  }
  
  geoip {
    source => "dest_ip"
    target => "dest_geo"
    database => "/usr/share/logstash/vendor/bundle/jruby/2.6.0/gems/geoip-6.1.0-java/vendor/GeoLite2-City.mmdb"
  }
  
  mutate {
    convert => {
      "bytes" => "integer"
      "src_bytes" => "integer"
      "dest_bytes" => "integer"
    }
  }
  
  if [threat][indicator] {
    mutate { add_field => { "is_threat_indicator" => "true" } }
  }
  
  ruby {
    code => "
      if event.get('src_ip') && event.get('dest_ip')
        if event.get('src_ip').start_with?('10.') || event.get('src_ip').start_with?('192.168.')
          event.set('is_internal_src', true)
        end
        if event.get('dest_ip').start_with?('10.') || event.get('dest_ip').start_with?('192.168.')
          event.set('is_internal_dest', true)
        end
      end
    "
  }
}

output {
  if [event_type] == "process_creation" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "chronos-processes-%{+YYYY.MM.dd}"
    }
  } else if [event_type] == "network_connection" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "chronos-network-%{+YYYY.MM.dd}"
    }
  } else if [event_type] == "dns_query" {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "chronos-dns-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "chronos-events-%{+YYYY.MM.dd}"
    }
  }
  
  kafka {
    bootstrap_servers => "kafka:9092"
    topic_id => "chronos.enrichment"
    codec => json
  }
  
  if [is_threat_indicator] == "true" {
    kafka {
      bootstrap_servers => "kafka:9092"
      topic_id => "chronos.threats"
      codec => json
    }
  }
}
